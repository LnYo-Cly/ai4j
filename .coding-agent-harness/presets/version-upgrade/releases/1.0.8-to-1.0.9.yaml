schemaVersion: version-upgrade-manifest/v1
fromVersion: 1.0.8
toVersion: 1.0.9
summary: Upgrade Harness projects from 1.0.8 to 1.0.9 with preset reseeding, audit review, and manual confirmation gates.
safeActions:
  - id: seed-bundled-presets
    title: Refresh project-seeded bundled presets
    mode: report-only
    command: harness preset seed --project --force
    writeGlobs: [.coding-agent-harness/presets/**]
    verify: harness preset audit --project
  - id: collect-upgrade-evidence
    title: Capture task-local upgrade evidence
    mode: report-only
    command: harness preset run version-upgrade check
    writeGlobs: [{{paths.tasksRoot}}/**/artifacts/version-upgrade/**]
    verify: review upgrade-verify.json
manualConfirmations:
  - id: confirm-human-review-boundary
    title: Confirm no human review state is rewritten by upgrade automation
    verify: task-index --json and dashboard review queue inspection
  - id: confirm-release-notes-understood
    title: Confirm release-specific behavior changes have been reviewed by an owner
    verify: owner acknowledgement in task review.md
blockedActions:
  - id: rewrite-review-confirmations
    title: Rewrite or synthesize human review confirmations
    reason: Human confirmation is source-of-truth state and must not be generated by an upgrade preset.
  - id: delete-legacy-task-history
    title: Delete historical task or archive records during upgrade
    reason: Upgrade automation must preserve audit history and fail closed on destructive migrations.
verify:
  - id: preset-check
    command: harness preset check version-upgrade --json
  - id: target-task-index
    command: harness task-index --json
  - id: target-status
    command: harness status --json
