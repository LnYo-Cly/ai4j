name: flowgram-webapp-regression

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

concurrency:
  group: flowgram-webapp-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  detect-webapp-changes:
    name: detect-webapp-changes
    runs-on: ubuntu-latest
    outputs:
      webapp: ${{ steps.changed.outputs.webapp }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect FlowGram webapp regression surface
        id: changed
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "webapp=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch runs the full FlowGram webapp regression surface."
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [[ "$BASE" =~ ^0+$ ]]; then
              BASE="$(git rev-list --max-parents=0 "$HEAD")"
            fi
          fi

          echo "Changed files between $BASE and $HEAD:"
          CHANGED_FILES="$(git diff --name-only "$BASE" "$HEAD")"
          printf '%s\n' "$CHANGED_FILES"

          if printf '%s\n' "$CHANGED_FILES" | grep -Eq '^(ai4j-flowgram-webapp-demo/|\.github/workflows/flowgram-webapp-regression\.yml$)'; then
            echo "webapp=true" >> "$GITHUB_OUTPUT"
          else
            echo "webapp=false" >> "$GITHUB_OUTPUT"
          fi

  webapp-checks:
    name: webapp-checks
    runs-on: ubuntu-latest
    needs: detect-webapp-changes
    if: needs.detect-webapp-changes.outputs.webapp == 'true'
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ai4j-flowgram-webapp-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ai4j-flowgram-webapp-demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run ts-check

      - name: Build
        run: npm run build

  flowgram-webapp-regression:
    name: flowgram-webapp-regression
    runs-on: ubuntu-latest
    needs:
      - detect-webapp-changes
      - webapp-checks
    if: always()
    steps:
      - name: Assert FlowGram webapp regression gate
        shell: bash
        run: |
          echo "webapp changes: ${{ needs.detect-webapp-changes.outputs.webapp }}"
          echo "detect-webapp-changes: ${{ needs.detect-webapp-changes.result }}"
          echo "webapp-checks: ${{ needs.webapp-checks.result }}"

          if [[ "${{ needs.detect-webapp-changes.result }}" != "success" ]]; then
            echo "detect-webapp-changes did not pass."
            exit 1
          fi

          if [[ "${{ needs.detect-webapp-changes.outputs.webapp }}" != "true" ]]; then
            echo "No FlowGram webapp regression surface changed; required gate passes without running webapp checks."
            exit 0
          fi

          if [[ "${{ needs.webapp-checks.result }}" != "success" ]]; then
            echo "webapp-checks did not pass."
            exit 1
          fi
